<!DOCTYPE html>
<html>

<head>
  <!-- Basic -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- Mobile Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <!-- Site Metas -->
  <meta name="keywords" content="" />
  <meta name="description" content="" />
  <meta name="author" content="" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.png') }}" type="image/png" />

  <title>Ohmeals</title>

  <!-- bootstrap core css -->
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/bootstrap.css') }}" />

  <!--owl slider stylesheet -->
  <link rel="stylesheet" type="text/css"
    href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" />

  <!-- nice select  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-nice-select/1.1.0/css/nice-select.min.css"
    integrity="sha512-CruCP+TD3yXzlvvijET8wV5WxxEh5H8P4cmz0RFbKK6FlZ2sYl3AEsKlLPHbniXKSrDdFewhbmBK5skbdsASbQ=="
    crossorigin="anonymous" />

  <!-- font awesome style -->
  <link href="{{ url_for('static', filename='css/font-awesome.min.css') }}" rel="stylesheet" />

  <!-- Custom styles for this template -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
  <!-- Modern Product Display Styles -->
  <link href="{{ url_for('static', filename='css/products.css') }}" rel="stylesheet" />
  <!-- responsive style -->
  <link href="{{ url_for('static', filename='css/responsive.css') }}" rel="stylesheet" />
</head>

<body class="sub_page">
  <div class="hero_area">
    <div class="bg-box">
      <img src="{{ url_for('static', filename='images/hero-bg.jpg') }}" alt="" />
    </div>
    <!-- header section starts -->
    <header class="header_section">
      <div class="container">
        <nav class="navbar navbar-expand-lg custom_nav-container">
          <a class="navbar-brand" href="{{ url_for('page.index') }}">
            <span>Ohmeals</span>
          </a>

          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class=""> </span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mx-auto">
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('page.index') }}">Accueil</a>
              </li>
              <li class="nav-item active">
                <a class="nav-link" href="{{ url_for('menu.menu') }}">Menu <span class="sr-only">(courant)</span></a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('page.about') }}">À propos</a>
              </li>
            </ul>

            <div class="user_option">
              <a href="{{ url_for('auth.login') }}" class="user_link">
                <i class="fa fa-user" aria-hidden="true"></i>
              </a>
              <a class="cart_link" href="{{ url_for('menu.book') }}" style="position: relative">
                <i class="fa fa-shopping-cart"></i>
                <span id="cart-count" style="
                      position: absolute;
                      top: -8px;
                      right: -8px;
                      background: var(--primary);
                      color: #fff;
                      padding: 2px 6px;
                      border-radius: 50%;
                      font-size: 0.7rem;
                      display: none;
                    ">0</span>
              </a>
              <a href="{{ url_for('menu.book') }}" class="order_online">Commander</a>
            </div>
          </div>
        </nav>
      </div>
    </header>
    <!-- end header section -->
  </div>

  <!-- food section -->
  <section class="food_section layout_padding mt-5">
    <div class="container">
      <div class="heading_container heading_center">
        <h2>Notre Menu</h2>
      </div>

      <!-- Category Filters (Modern) -->
      <ul class="filters_menu" id="categoryFilters">
        <li class="active" data-filter="*">Tous</li>
        <li data-filter="snack">Snacks</li>
        <li data-filter="plat">Plats</li>
        <li data-filter="salade">Salades</li>
      </ul>

      <!-- Sorting Controls (Modern) -->
      <div class="sorting-controls">
        <select id="sortPrice" class="sort-select">
          <option value="default">Tri: Prix par défaut</option>
          <option value="asc">Prix: Croissant</option>
          <option value="desc">Prix: Décroissant</option>
        </select>
        <select id="sortTaste" class="sort-select">
          <option value="all">Goût: Tous</option>
          <option value="sucre">Sucré</option>
          <option value="sale">Salé</option>
        </select>
      </div>

      <div class="filters-content">
        <!-- Data for JS -->
        <div id="products-data" data-products='{{ (products or []) | tojson | safe }}' style="display: none;"></div>

        <script>
          // Safe way to get data from Jinja to JS without lint errors
          const productsDataEl = document.getElementById('products-data');
          window.productsDB = productsDataEl ? JSON.parse(productsDataEl.getAttribute('data-products')) : [];
        </script>
        <!-- Modern Grid -->
        <div id="productsGrid"></div>
      </div>
    </div>
  </section>

  <!-- Modern Animated Modal (Popup) -->
  <div class="pm-overlay" id="productModalOverlay">
    <div class="pm-box">
      <!-- Media Section -->
      <div class="pm-gallery" id="pmGallery">
        <!-- Injected by JS -->
      </div>
      <!-- Thumbnails -->
      <div class="pm-thumbnails" id="pmThumbnails">
        <!-- Injected by JS -->
      </div>

      <!-- Content Section -->
      <div class="pm-content">
        <div class="pm-header">
          <h2 class="pm-title" id="pmTitle">Nom du produit</h2>
          <button class="pm-close" onclick="closeModal()">✕</button>
        </div>

        <div class="pm-badges-row" id="pmBadgesRow">
          <!-- Injected by JS -->
        </div>

        <p class="pm-desc" id="pmDesc">Description...</p>

        <!-- Dynamic Video Section (Hidden if none) -->
        <div class="pm-video-section" id="pmVideoSection" style="display: none;">
          <h6><i class="fa fa-play-circle"></i> Aperçu Vidéo</h6>
          <div id="pmVideoContainer"></div>
        </div>

        <hr class="pm-divider">

        <h6 class="pm-variants-label">Choisissez une option :</h6>
        <div class="pm-variants-grid" id="pmVariantsGrid">
          <!-- Injected by JS -->
        </div>

        <div class="pm-qty-row">
          <div class="pm-qty-controls">
            <button class="pm-qty-btn" onclick="updateModalQty(-1)">-</button>
            <span class="pm-qty-value" id="pmQtyValue">1</span>
            <button class="pm-qty-btn" onclick="updateModalQty(1)">+</button>
          </div>
          <div class="text-end">
            <span class="pm-total-label">Prix Total</span>
            <div class="pm-total-price" id="pmTotalPrice">0.00 DT</div>
          </div>
        </div>

        <button class="pm-add-btn" onclick="handleModalAddToCart()">
          <i class="fa fa-shopping-basket"></i> Ajouter au panier
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="pm-toast" id="pmToast">Produit ajouté !</div>
  <!-- end food section -->

  <!-- footer section -->
  {% include 'includes/footer.html' %}
  <!-- end footer section -->

  <script src="{{ url_for('static', filename='js/jquery-3.4.1.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/bootstrap.js') }}"></script>
  <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
  <script src="{{ url_for('static', filename='js/menu.js') }}"></script>
  <script src="{{ url_for('static', filename='js/custom.js') }}"></script>
</body>

</html>
