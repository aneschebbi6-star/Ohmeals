<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password Required</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #060606, #4d535e);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .login-box h2 {
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
        }

        .btn-primary {
            background: #cba719;
            border: none;
            height: 45px;
            border-radius: 8px;
            font-weight: 600;
            color: #000;
        }

        .btn-primary:hover {
            background: #e5bd24;
        }

        .password-wrapper {
            position: relative;
        }

        .eye-toggle {
            position: absolute;
            right: 15px;
            top: 40px;
            /* Adjusted for label */
            cursor: pointer;
            color: #555;
            font-size: 1.2rem;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <div class="login-box">
        <form method="POST" action="{{ url_for('auth.change_password') }}">
            <h2>Sécurité Requise</h2>
            <p class="text-muted text-center mb-4">Vous devez changer votre mot de passe pour continuer.</p>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <div class="mb-3 position-relative">
                <label class="form-label">Nouveau mot de passe</label>
                <input type="password" name="new_password" class="form-control" required minlength="6" id="newPassword">
                <span class="eye-toggle" onclick="togglePassword('newPassword', this)">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            <div class="mb-3 position-relative">
                <label class="form-label">Confirmer le mot de passe</label>
                <input type="password" name="confirm_password" class="form-control" required minlength="6"
                    id="confirmPassword">
                <span class="eye-toggle" onclick="togglePassword('confirmPassword', this)">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            <button type="submit" class="btn btn-primary w-100">Mettre à jour</button>
            <a href="{{ url_for('auth.logout') }}" class="btn btn-link w-100 mt-2"
                style="text-decoration: none; color: #666;">Se déconnecter</a>
        </form>
    </div>

    <script>
        function togglePassword(inputId, iconSpan) {
            const input = document.getElementById(inputId);
            const icon = iconSpan.querySelector('i');

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            }
        }
    </script>
</body>

</html>
