<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OHMEALS - Admin Complet (Flask + React)</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* --- STYLE ORIGINAL CONSERVÉ --- */
    :root {
      /* PALETTE NOIR & JAUNE */
      --bg-main: #121212;
      --bg-card: #1e1e1e;
      --accent: #cba719;
      /* Jaune Moutarde */
      --accent-hover: #bf9619;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border: #374151;
      --danger: #992e2e;
      --success: #258968;
      --warning: #d97706;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background-color: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-main);
      overflow: hidden;
    }

    /* UI COMPONENTS */
    .logo-area {
      padding: 0 24px 24px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      color: var(--accent);
    }

    .nav-item {
      padding: 12px 24px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
      border-left: 3px solid transparent;
      text-decoration: none;
      /* Pour le lien Accueil */
    }

    .nav-item:hover {
      background-color: rgba(250, 204, 21, 0.05);
      color: var(--text-main);
    }

    .nav-item.active {
      background: linear-gradient(90deg,
          rgba(250, 204, 21, 0.1) 0%,
          transparent 100%);
      color: var(--accent);
      border-left-color: var(--accent);
    }

    .header {
      height: 64px;
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    /* BUTTONS & INPUTS */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background-color: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .btn-danger {
      background-color: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-danger:hover {
      background-color: var(--danger);
      color: white;
    }

    .btn-edit {
      background-color: #374151;
      color: var(--text-main);
    }

    .btn-edit:hover {
      background-color: #4b5563;
    }

    .btn-sm {
      padding: 4px 8px;
      font-size: 0.8rem;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .input-control {
      width: 100%;
      background-color: #0f0f0f;
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 10px;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .input-control:focus {
      outline: 1px solid var(--accent);
      border-color: var(--accent);
    }

    textarea.input-control {
      resize: vertical;
      min-height: 80px;
    }

    /* TABLES */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px;
      color: var(--text-main);
      font-size: 0.9rem;
      border-bottom: 1px solid #2a2a2a;
      vertical-align: middle;
    }

    tr:hover {
      background-color: rgba(255, 255, 255, 0.02);
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      backdrop-filter: blur(2px);
    }

    .modal {
      background: var(--bg-card);
      width: 100%;
      max-width: 700px;
      /* Plus large pour gérer les variantes */
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 25 -5px rgba(0, 0, 0, 0.5);
      max-height: 90vh;
      overflow-y: auto;
    }

    /* UTILS */
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .mb-20 {
      margin-bottom: 20px;
    }

    .mt-10 {
      margin-top: 10px;
    }

    .mb-10 {
      margin-bottom: 10px;
    }

    /* STYLES SUPPLÉMENTAIRES POUR LES IMAGES */
    .product-thumb {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .preview-container {
      width: 100%;
      height: 150px;
      background-color: #0f0f0f;
      border: 1px dashed var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      overflow: hidden;
    }

    .preview-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-success {
      background-color: rgba(37, 137, 104, 0.2);
      color: var(--success);
    }

    .badge-warning {
      background-color: rgba(217, 119, 6, 0.2);
      color: var(--warning);
    }

    .badge-danger {
      background-color: rgba(153, 46, 46, 0.2);
      color: var(--danger);
    }

    .badge-default {
      background-color: rgba(156, 163, 175, 0.2);
      color: var(--text-muted);
    }

    .badge-primary {
      background-color: rgba(203, 167, 25, 0.2);
      color: var(--accent);
    }

    .loading-spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--accent);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 50px auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Variants Styling in Modal */
    .variant-row {
      background: rgba(255, 255, 255, 0.03);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }

    .variant-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    {% raw %}
    const { useState, useEffect, useMemo } = React;

    // --- UTILITAIRES API ---
    const API_URL = "/api";

    const apiRequest = async (endpoint, method = "GET", body = null) => {
      const options = {
        method,
        headers: {
          "Content-Type": "application/json",
        },
      };
      if (body) {
        options.body = JSON.stringify(body);
      }

      try {
        const response = await fetch(`${API_URL}${endpoint}`, options);

        // Si la réponse n'est pas OK, on tente de lire le JSON d'erreur
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || `Erreur HTTP: ${response.status}`);
        }

        if (response.status === 204) return null;
        return await response.json();
      } catch (error) {
        console.error("API Error:", error);
        alert(error.message || "Une erreur est survenue lors de la communication avec le serveur.");
        return null;
      }
    };

    // --- COMPOSANTS ---

    const Sidebar = ({ activeView, setView }) => {
      const menuItems = [
        { id: "dashboard", label: "Dashboard", icon: "fa-chart-pie" },
        { id: "products", label: "Produits", icon: "fa-box-open" },
        { id: "orders", label: "Commandes", icon: "fa-shopping-basket" },
        { id: "admins", label: "Administrateurs", icon: "fa-users-cog" },
      ];

      return (
        <div className="sidebar">
          <div className="logo-area">
            <i className="fas fa-utensils logo-icon"></i>
            <span>OHMEALS</span>
          </div>
          <nav>
            {/* BOUTON ACCUEIL (Maison) pour retourner à l'index */}
            <a href="/" className="nav-item" title="Retour au site">
              <i className="fas fa-home"></i>
              <span>Accueil</span>
            </a>

            {menuItems.map((item) => (
              <div
                key={item.id}
                className={`nav-item ${activeView === item.id ? "active" : ""
                  }`}
                onClick={() => setView(item.id)}
              >
                <i className={`fas ${item.icon}`}></i>
                {item.label}
              </div>
            ))}
          </nav>
        </div>
      );
    };

    const Modal = ({ onClose, title, children, size = "md" }) => {
      const sizeStyle = size === "lg" ? { maxWidth: "800px" } : {};
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()} style={sizeStyle}>
            <div className="flex-between mb-20">
              <h3 style={{ color: "var(--text-main)" }}>{title}</h3>
              <i
                className="fas fa-times"
                style={{ cursor: "pointer", color: "var(--text-muted)" }}
                onClick={onClose}
              ></i>
            </div>
            {children}
          </div>
        </div>
      );
    };

    // --- 1. GESTION PRODUITS (AVEC VARIANTES) ---
    const ProductManager = ({ products, setProducts }) => {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingProduct, setEditingProduct] = useState(null);

      // Formulaire avec support des variantes
      const [formData, setFormData] = useState({
        name: "",
        description: "",
        category: "snack",
        taste: "sale",
        image: "",
        is_active: true,
        variants: [
          { variant_name: "", unit: "piece", price: "", is_available: true, is_default: true }
        ]
      });
      const [sortType, setSortType] = useState("default");

      const refreshProducts = async () => {
        const data = await apiRequest("/products");
        if (data) setProducts(data);
      };

      const resetForm = () => ({
        name: "",
        description: "",
        category: "snack",
        taste: "sale",
        image: "",
        is_active: true,
        variants: [
          { variant_name: "", unit: "piece", price: "", is_available: true, is_default: true }
        ]
      });

      const handleOpenModal = (product = null) => {
        if (product) {
          setEditingProduct(product);
          setFormData({
            name: product.name,
            description: product.description || "",
            category: product.category,
            taste: product.taste,
            image: product.image || "",
            is_active: product.is_active,
            variants: product.variants.map(v => ({ ...v })) // Clone array
          });
        } else {
          setEditingProduct(null);
          setFormData(resetForm());
        }
        setIsModalOpen(true);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setFormData({ ...formData, image: reader.result });
          };
          reader.readAsDataURL(file);
        }
      };

      // Gestion des changements sur une variante spécifique
      const handleVariantChange = (index, field, value) => {
        const newVariants = [...formData.variants];
        newVariants[index][field] = value;
        setFormData({ ...formData, variants: newVariants });
      };

      // Ajouter une variante
      const addVariant = () => {
        setFormData({
          ...formData,
          variants: [
            ...formData.variants,
            { variant_name: "", unit: "piece", price: "", is_available: true, is_default: false }
          ]
        });
      };

      // Supprimer une variante
      const removeVariant = (index) => {
        if (formData.variants.length <= 1) {
          alert("Il faut au moins une variante.");
          return;
        }
        const newVariants = formData.variants.filter((_, i) => i !== index);
        // Si on supprime le défaut, on met le premier par défaut
        if (formData.variants[index].is_default && newVariants.length > 0) {
          newVariants[0].is_default = true;
        }
        setFormData({ ...formData, variants: newVariants });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();

        // Validation simple
        if (!formData.name || formData.variants.length === 0) return;

        // Préparation du payload
        const payload = {
          name: formData.name,
          description: formData.description,
          category: formData.category,
          taste: formData.taste,
          image: formData.image,
          is_active: formData.is_active
        };

        if (editingProduct) {
          // Mode ÉDITION : Envoi de la liste complète des variantes
          payload.variants = formData.variants.map((v, i) => ({
            id: v.id, // On garde l'ID si ça existe pour update, sinon null pour création
            variant_name: v.variant_name || "Standard", // Default name if empty
            unit: v.unit,
            price: parseFloat(v.price) || 0,
            is_available: v.is_available,
            is_default: v.is_default,
            position: i + 1
          }));
          await apiRequest(`/products/${editingProduct.id}`, "PUT", payload);
        } else {
          // Mode CRÉATION : L'API Python attend une variante "racine" pour la création simple
          // On envoie la première variante
          const firstVar = formData.variants[0];
          payload.variant_name = firstVar.variant_name || "Standard"; // Default if empty
          payload.unit = firstVar.unit;
          payload.price = parseFloat(firstVar.price) || 0;

          await apiRequest("/products", "POST", payload);
        }

        setIsModalOpen(false);
        refreshProducts();
      };

      const handleDelete = async (id) => {
        if (window.confirm("Supprimer ce produit et ses variantes ?")) {
          await apiRequest(`/products/${id}`, "DELETE");
          refreshProducts();
        }
      };

      const sortedProducts = useMemo(() => {
        let data = [...products];
        if (sortType === "price_asc") {
          // Trie par prix de la variante par défaut (ou la première)
          data.sort((a, b) => {
            const priceA = a.variants && a.variants.length > 0 ? a.variants.find(v => v.is_default)?.price || a.variants[0].price : 0;
            const priceB = b.variants && b.variants.length > 0 ? b.variants.find(v => v.is_default)?.price || b.variants[0].price : 0;
            return priceA - priceB;
          });
        }
        if (sortType === "price_desc") {
          data.sort((a, b) => {
            const priceA = a.variants && a.variants.length > 0 ? a.variants.find(v => v.is_default)?.price || a.variants[0].price : 0;
            const priceB = b.variants && b.variants.length > 0 ? b.variants.find(v => v.is_default)?.price || b.variants[0].price : 0;
            return priceB - priceA;
          });
        }
        return data;
      }, [products, sortType]);

      // Helper pour trouver le prix à afficher
      const getDisplayPrice = (product) => {
        if (!product.variants || product.variants.length === 0) return "N/A";
        const defVar = product.variants.find(v => v.is_default) || product.variants[0];
        return `${defVar.price} DT / ${defVar.unit}`;
      }

      return (
        <div>
          <div className="flex-between mb-20">
            <h2>Gestion Produits</h2>
            <button
              className="btn btn-primary"
              onClick={() => handleOpenModal()}
            >
              <i className="fas fa-plus"></i> Ajouter
            </button>
          </div>

          <div className="card">
            <div
              style={{ display: "flex", gap: "10px", marginBottom: "15px" }}
            >
              <select
                className="input-control"
                style={{ maxWidth: "200px" }}
                onChange={(e) => setSortType(e.target.value)}
              >
                <option value="default">Trier par défaut</option>
                <option value="price_asc">Prix (Croissant)</option>
                <option value="price_desc">Prix (Décroissant)</option>
              </select>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Image</th>
                  <th>Produit</th>
                  <th>Catégorie</th>
                  <th>Goût</th>
                  <th>Prix (Par défaut)</th>
                  <th>Statut</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {sortedProducts.map((p) => (
                  <tr key={p.id}>
                    <td>
                      {p.image ? (
                        <img src={p.image} alt={p.name} className="product-thumb" />
                      ) : (
                        <div className="product-thumb" style={{ background: '#333' }}></div>
                      )}
                    </td>
                    <td>
                      <strong>{p.name}</strong>
                    </td>
                    <td>
                      <span className={`badge badge-primary`}>
                        {(p.category || "").toUpperCase()}
                      </span>
                    </td>
                    <td>{p.taste || "-"}</td>
                    <td
                      style={{ color: "var(--accent)", fontWeight: "bold" }}
                    >
                      {getDisplayPrice(p)}
                    </td>
                    <td>
                      <span className={`badge ${p.is_active ? 'badge-success' : 'badge-danger'}`}>
                        {p.is_active ? "Actif" : "Inactif"}
                      </span>
                    </td>
                    <td>
                      <button
                        className="btn btn-edit btn-sm"
                        onClick={() => handleOpenModal(p)}
                      >
                        <i className="fas fa-edit"></i>
                      </button>
                      <button
                        className="btn btn-danger btn-sm"
                        style={{ marginLeft: "5px" }}
                        onClick={() => handleDelete(p.id)}
                      >
                        <i className="fas fa-trash"></i>
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {isModalOpen && (
            <Modal
              onClose={() => setIsModalOpen(false)}
              title={editingProduct ? "Modifier Produit" : "Ajouter Produit"}
              size="lg"
            >
              <form onSubmit={handleSubmit}>
                {/* Section Info Produit */}
                <div className="input-group">
                  <label>Image du produit</label>
                  <input
                    type="file"
                    className="input-control"
                    accept="image/*"
                    onChange={handleImageUpload}
                  />
                  {formData.image && (
                    <div className="preview-container">
                      <img src={formData.image} alt="Aperçu" />
                    </div>
                  )}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                  <div className="input-group">
                    <label>Nom du produit</label>
                    <input className="input-control" required value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} />
                  </div>
                  <div className="input-group">
                    <label>Catégorie</label>
                    <select className="input-control" value={formData.category} onChange={(e) => setFormData({ ...formData, category: e.target.value })}>
                      <option value="snack">Snack</option>
                      <option value="plat">Plat</option>
                      <option value="salade">Salade</option>
                    </select>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                  <div className="input-group">
                    <label>Goût</label>
                    <select className="input-control" value={formData.taste} onChange={(e) => setFormData({ ...formData, taste: e.target.value })}>
                      <option value="sale">Salé</option>
                      <option value="sucré">Sucré</option>
                    </select>
                  </div>
                  <div className="input-group">
                    <label>Disponibilité Produit</label>
                    <div style={{ display: "flex", alignItems: "center", height: "40px" }}>
                      <input
                        type="checkbox"
                        checked={formData.is_active}
                        onChange={(e) => setFormData({ ...formData, is_active: e.target.checked })}
                        style={{ width: "20px", height: "20px" }}
                      />
                      <span style={{ marginLeft: "10px", color: "var(--text-muted)" }}>Actif</span>
                    </div>
                  </div>
                </div>
                <div className="input-group">
                  <label>Description</label>
                  <textarea className="input-control" value={formData.description} onChange={(e) => setFormData({ ...formData, description: e.target.value })}></textarea>
                </div>

                <hr style={{ borderColor: "var(--border)", margin: "20px 0" }} />

                {/* Section Variantes */}
                <h4 style={{ marginBottom: "15px" }}>Variantes</h4>
                {formData.variants.map((v, idx) => (
                  <div key={idx} className="variant-row">
                    <div className="variant-header">
                      <span>Variante #{idx + 1}</span>
                      {formData.variants.length > 1 && (
                        <button type="button" className="btn btn-danger btn-sm" onClick={() => removeVariant(idx)}>
                          <i className="fas fa-trash"></i>
                        </button>
                      )}
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: "10px" }}>
                      <div>
                        <input
                          className="input-control"

              <div class="info-section">

                  <p>📍 ${order.delivery_address}</p>

              </div>

              <table>
                <thead>
                  <tr>

                    <th style="text-align: right;">Prix</th>

                </thead>
                <tbody>
                  ${itemsHtml}

                  <tr class="total-row">

                  </tr>
                </tfoot>
              </table>

                <p>Merci pour votre commande chez OHMEALS !</p>
                <p>Traiteur Marocain - Saveurs authentiques</p>
              </div>
            </div>

        `;

        invoiceWindow.document.close();

      return (
        <div>

            <div style={{ display: "flex", gap: "10px" }}>
              <select
                className="input-control"

              <tbody>
                {sortedOrders.map((o) => (
                  <tr key={o.id}>
                    <td>
                      <strong>{o.customer_name}</strong>
                      <div
                        style={{
                          fontSize: "0.8rem",
                          color: "var(--text-muted)",
                        }}
                      >
                        {o.delivery_address}

                    </td>
                    <td>{o.customer_phone}</td>
                    <td>
                      {o.items && o.items.length > 0 ? (
                        <div style={{ fontSize: "0.85rem" }}>
                          {o.items.map((item, idx) => (
                            <div key={idx} style={{ marginBottom: "4px", padding: "2px 0", borderBottom: idx < o.items.length - 1 ? "1px dashed var(--border)" : "none" }}>
                              <span style={{ fontWeight: "500" }}>{item.product_name || `Produit #${item.product_id}`}</span>
                              <span style={{ color: "var(--text-muted)", marginLeft: "8px" }}>
                                x{item.quantity} {item.unit}
                              </span>
                              <span style={{ color: "var(--accent)", marginLeft: "8px", fontWeight: "bold" }}>
                                {(item.price || 0).toFixed(2)} DT
                              </span>
                            </div>

                        <span style={{ color: "var(--text-muted)", fontStyle: "italic" }}>Aucun produit</span>
                      )}
                    </td>
                    <td
                      style={{ color: "var(--accent)", fontWeight: "bold" }}
                    >
                      {(o.total_price || o.total || 0).toFixed(2)} DT

                    <td>{getStatusBadge(o.status)}</td>

    // --- 4. GESTION ADMINS (Inchangée) ---
    const AdminManager = ({ admins, setAdmins }) => {
      const [isModalOpen, setIsModalOpen] = React.useState(false);
      const [editingAdmin, setEditingAdmin] = React.useState(null);
      const [formData, setFormData] = React.useState({
        username: "",
        email: "",
        password: "",
      });

      const apiRequest = async (url, method = "GET", data = null) => {
        try {
          const options = {
            method,
            headers: { "Content-Type": "application/json" }
          };
          if (data) options.body = JSON.stringify(data);

          const res = await fetch(url, options);
          return await res.json();
        } catch (err) {
          console.error(err);
          return null;
        }
      };

      const refreshAdmins = async () => {
        const data = await apiRequest("/api/admins");
        if (data) setAdmins(data);
      }

      const handleOpenModal = (admin = null) => {
        if (admin) {
          setEditingAdmin(admin);
          setFormData({ username: admin.username, email: admin.email, password: "" });
        } else {
          setEditingAdmin(null);
          setFormData({ username: "", email: "", password: "" });
        }
        setIsModalOpen(true);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const payload = { username: formData.username, email: formData.email };
        if (!editingAdmin || formData.password.trim() !== "") {
          payload.password = formData.password;
        }

        if (editingAdmin) {
          await apiRequest(`/api/admins/${editingAdmin.id}`, "PUT", payload);
        } else {
          await apiRequest("/api/admins", "POST", payload);
        }

        setIsModalOpen(false);
        refreshAdmins();
      };

      const handleDelete = async (id) => {
        if (window.confirm("Supprimer cet admin ?")) {
          await apiRequest(`/api/admins/${id}`, "DELETE");
          refreshAdmins();
        }
      };

      return (
        <div>
          <div className="flex-between mb-20">
            <h2>Gestion Administrateurs</h2>
            <button className="btn btn-primary" onClick={() => handleOpenModal()}>
              <i className="fas fa-plus"></i> Ajouter
            </button>
          </div>

          <div className="card">
            <table>
              <thead>
                <tr>
                  <th>Username</th>
                  <th>Email</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                {admins.map((a) => (
                  <tr key={a.id}>
                    <td>{a.username}</td>
                    <td>{a.email}</td>
                    <td>
                      <button className="btn btn-edit" onClick={() => handleOpenModal(a)}>
                        <i className="fas fa-edit"></i>
                      </button>
                      <button className="btn btn-danger" onClick={() => handleDelete(a.id)}>
                        <i className="fas fa-trash"></i>
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {isModalOpen && (
            <Modal
              onClose={() => setIsModalOpen(false)}
              title={editingAdmin ? "Modifier Admin" : "Ajouter un Administrateur"}
            >
              <form onSubmit={handleSubmit}>
                <div className="input-group">
                  <label>Username</label>
                  <input type="text" required value={formData.username} onChange={(e) => setFormData({ ...formData, username: e.target.value })} />
                </div>
                <div className="input-group">
                  <label>Email</label>
                  <input type="email" required value={formData.email} onChange={(e) => setFormData({ ...formData, email: e.target.value })} />
                </div>
                <div className="input-group">
                  <label>Mot de passe {editingAdmin && "(Laisser vide pour ne pas changer)"}</label>
                  <input type="password" required={!editingAdmin} value={formData.password} onChange={(e) => setFormData({ ...formData, password: e.target.value })} />
                </div>
                <button type="submit" className="btn btn-primary" style={{ width: "100%" }}>
                  {editingAdmin ? "Modifier" : "Créer Admin"}
                </button>
              </form>
            </Modal>
          )}
        </div>
      );
    };


    // --- APP PRINCIPALE ---
    const App = () => {
      const [activeView, setActiveView] = useState("dashboard");
      const [loading, setLoading] = useState(true);

      // États initiaux vides
      const [products, setProducts] = useState([]);
      const [orders, setOrders] = useState([]);
      const [cities, setCities] = useState([]);
      const [admins, setAdmins] = useState([]);

      // Fetch Initial Data
      useEffect(() => {
        const initDashboard = async () => {
          setLoading(true);
          try {
            const [pRes, oRes, cRes, aRes] = await Promise.all([
              apiRequest("/products"),
              apiRequest("/orders"),
              apiRequest("/cities"),
              apiRequest("/admins")
            ]);

            if (pRes) setProducts(pRes);
            if (oRes) setOrders(oRes);
            if (cRes) setCities(cRes);
            if (aRes) setAdmins(aRes);
          } catch (error) {
            console.error("Erreur init dashboard", error);
          } finally {
            setLoading(false);
          }
        };

        initDashboard();
      }, []);

      const renderView = () => {
        if (loading) return <div className="loading-spinner"></div>;

        switch (activeView) {
          case "dashboard":
            return (
              <div>
                <h2>Tableau de Bord</h2>
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns:
                      "repeat(auto-fit, minmax(200px, 1fr))",
                    gap: "20px",
                    marginBottom: "24px",
                  }}
                >
                  <div
                    className="card"
                    style={{ borderLeft: "4px solid var(--accent)" }}
                  >
                    <div
                      style={{
                        fontSize: "1.8rem",
                        fontWeight: "700",
                        color: "var(--text-main)",
                      }}
                    >
                      {orders.length}
                    </div>
                    <div
                      style={{
                        color: "var(--text-muted)",
                        fontSize: "0.85rem",
                      }}
                    >
                      Commandes Totales
                    </div>
                  </div>
                  <div
                    className="card"
                    style={{ borderLeft: "4px solid var(--success)" }}
                  >
                    <div
                      style={{
                        fontSize: "1.8rem",
                        fontWeight: "700",
                        color: "var(--text-main)",
                      }}
                    >
                      {orders.reduce((acc, o) => acc + (parseFloat(o.total) || 0), 0)} DT
                    </div>
                    <div
                      style={{
                        color: "var(--text-muted)",
                        fontSize: "0.85rem",
                      }}
                    >
                      Revenu Total
                    </div>
                  </div>
                  <div
                    className="card"
                    style={{ borderLeft: "4px solid #9CA3AF" }}
                  >
                    <div
                      style={{
                        fontSize: "1.8rem",
                        fontWeight: "700",
                        color: "var(--text-main)",
                      }}
                    >
                      {products.filter(p => p.is_active || p.isActive).length}
                    </div>
                    <div
                      style={{
                        color: "var(--text-muted)",
                        fontSize: "0.85rem",
                      }}
                    >
                      Produits Actifs
                    </div>
                  </div>
                </div>
                <h3>Dernières Commandes</h3>
                <div
                  className="card mt-10"
                  style={{ padding: "0", overflow: "hidden" }}
                >
                  <table>
                    <thead>
                      <tr>
                        <th>Client</th>
                        <th>Montant</th>
                        <th>Statut</th>
                      </tr>
                    </thead>
                    <tbody>
                      {orders.slice(0, 5).map((o) => (
                        <tr key={o.id}>
                          <td>{o.customer_name}</td>
                          <td>{o.total} DT</td>
                          <td>
                            <span className="badge badge-default">
                              {o.status}
                            </span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          case "products":
            return (
              <ProductManager products={products} setProducts={setProducts} />
            );
          case "orders":
            return (
              <OrderManager
                orders={orders}
                setOrders={setOrders}
                cities={cities}
              />
            );
          case "admins":
            return <AdminManager admins={admins} setAdmins={setAdmins} />;
          default:
            return <div>Page en construction</div>;
        }
      };

      return (
        <div className="app-container">
          <Sidebar activeView={activeView} setView={setActiveView} />
          <div className="main-content">
            <header className="header">
              <div style={{ fontWeight: 600 }}>OHMEALS Admin</div>
              <div
                style={{
                  width: 32,
                  height: 32,
                  borderRadius: "50%",
                  background: "var(--bg-card)",
                  border: "1px solid var(--border)",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  color: "var(--accent)",
                }}
              >
                A
              </div>
            </header>
            <div className="content-scroll">{renderView()}</div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
    {% endraw %}
  </script>
</body>

</html>
