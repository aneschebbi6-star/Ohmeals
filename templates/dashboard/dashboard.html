                  <button type="submit" className="btn btn-primary" style={{ padding: '12px' }}>
                    <i className={`fas ${editingExpense ? 'fa-save' : 'fa-plus'}`} style={{ marginRight: '6px' }}></i>
                    {editingExpense ? 'Sauvegarder' : 'Ajouter'}
                  </button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    };

    // --- APP PRINCIPALE ---
    const App = () => {
      const [activeView, setActiveView] = useState("dashboard");
      const [loading, setLoading] = useState(true);
      const [products, setProducts] = useState([]);
      const [orders, setOrders] = useState([]);
      const [cities, setCities] = useState([]);
      const [admins, setAdmins] = useState([]);
      const [stats, setStats] = useState(null); // New stats state
      const [user, setUser] = useState(currentUser); // Local state for current user

      useEffect(() => {
        const init = async () => {
          setLoading(true);
          const [pRes, oRes, cRes, aRes, sRes] = await Promise.all([
            apiRequest("/products"),
            apiRequest("/orders"),
            apiRequest("/cities"),
            apiRequest("/admins"),
            apiRequest("/stats")
          ]);
          if (pRes) setProducts(pRes);
          if (oRes) setOrders(oRes);
          if (cRes) setCities(cRes);
          if (aRes) setAdmins(aRes);
          if (sRes) setStats(sRes);
          setLoading(false);
        };
        init();
      }, []);

      // Chart Effect
      useEffect(() => {
        if (activeView === 'dashboard' && stats && stats.chart_data && !loading) {
          const ctx = document.getElementById('salesChart');
          if (ctx) {
            // Destroy existing chart if needed (simple way: check simple instance or just render)
            // In React strict mode or re-renders, this might duplicate, but basic implementation:
            if (window.myChart instanceof Chart) window.myChart.destroy();

            window.myChart = new Chart(ctx, {
              type: 'bar',
              data: {
                labels: stats.chart_data.map(d => d.date),
                datasets: [{
                  label: 'Revenus (DT)',
                  data: stats.chart_data.map(d => d.total),
                  backgroundColor: 'rgba(203, 167, 25, 0.5)', // var(--accent)
                  borderColor: 'rgba(203, 167, 25, 1)',
                  borderWidth: 1
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                  y: { beginAtZero: true, grid: { color: '#333' } },
                  x: { grid: { display: false } }
                },
                plugins: {
                  legend: { labels: { color: '#aaa' } }
                }
              }
            });
          }
        }
      }, [activeView, stats, loading]);

      const renderView = () => {
        if (loading) return <div style={{ textAlign: 'center', padding: '50px' }}><i className="fas fa-spinner fa-spin fa-3x" style={{ color: 'var(--accent)' }}></i></div>;
        switch (activeView) {
          case "dashboard":
            return (
              <div>
                <h2 style={{ fontSize: '1.5rem', fontWeight: '700', marginBottom: '20px' }}>Tableau de Bord</h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: '20px', marginBottom: '32px' }}>
                  {[
                    { label: 'Commandes (Total)', val: (stats ? stats.total_orders : 0), color: 'var(--accent)', icon: 'fa-shopping-basket' },
                    { label: "Chiffre d'Affaires (Total)", val: (stats ? stats.total_revenue : 0).toFixed(2) + ' DT', color: 'var(--success)', icon: 'fa-wallet' },
                    { label: 'Bénéfice Net (Ce Mois)', val: (stats ? stats.total_net_profit : 0).toFixed(2) + ' DT', color: 'var(--info)', icon: 'fa-balance-scale' },
                    { label: 'Produits Actifs', val: products.filter(p => p.is_active).length, color: 'var(--warning)', icon: 'fa-box' }
                  ].map((stat, i) => (
                    <div key={i} className="card" style={{ borderLeft: `4px solid ${stat.color}`, display: 'flex', alignItems: 'center', gap: '20px' }}>
                      <div style={{ width: '50px', height: '50px', borderRadius: '12px', background: `${stat.color}20`, color: stat.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.5rem' }}>
                        <i className={`fas ${stat.icon}`}></i>
                      </div>
                      <div>
                        <div style={{ fontSize: '1.8rem', fontWeight: '700' }}>{stat.val}</div>
                        <div style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>{stat.label}</div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* --- STATS AVANCÉES --- */}
                <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '24px', marginBottom: '32px' }}>

                  {/* CHART */}
                  <div className="card">
                    <h3 style={{ marginBottom: '20px' }}>Revenus (7 derniers jours)</h3>
                    <div style={{ position: 'relative', height: '300px' }}>
                      <canvas id="salesChart"></canvas>
                    </div>
                  </div>

                  {/* TOP PRODUCTS */}
                  <div className="card">
                    <h3 style={{ marginBottom: '20px' }}>Top 5 Produits</h3>
                    {stats && stats.top_products ? (
                      <div>
                        {stats.top_products.map((p, i) => (
                          <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '12px 0', borderBottom: '1px solid #333' }}>
                            <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                              <span style={{ fontWeight: 'bold', color: 'var(--accent)', width: '24px' }}>#{i + 1}</span>
                              <span>{p.name}</span>
                            </div>
                            <span className="badge neutral">{p.sold} ventes</span>
                          </div>
                        ))}
                      </div>
                    ) : <div>Chargement...</div>}
                  </div>
                </div>

                <h3>Dernières Commandes</h3>
                <div className="card" style={{ padding: 0 }}>
                  <table><thead><tr><th>Client</th><th>Montant</th><th>Statut</th></tr></thead>
                    <tbody>{orders.slice(0, 5).map(o => (<tr key={o.id}><td>{o.customer_name}</td><td>{(o.total_price || o.total || 0).toFixed(2)} DT</td><td>{getStatusBadge(o.status)}</td></tr>))}</tbody></table>
                </div>
              </div>
            );
          case "products": return <ProductManager products={products} setProducts={setProducts} />;
          case "orders": return <OrderManager orders={orders} setOrders={setOrders} cities={cities} />;
          case "accounting": return <AccountingDashboard />;
          case "admins": return <AdminManager admins={admins} setAdmins={setAdmins} currentUser={user} setCurrentUser={setUser} />;
          case "settings": return <SettingsManager />;
          default: return <div>Page en construction</div>;
        }
      };

      const getStatusBadge = (status) => {
        let icon = "fa-clock"; let cls = "warning";
        if (status === "Livré") { icon = "fa-check"; cls = "success"; } if (status === "En préparation") { icon = "fa-fire"; cls = "primary"; } if (status === "Annulé") { icon = "fa-ban"; cls = "danger"; }
        return <span className={`badge ${cls}`}><i className={`fas ${icon}`}></i> {status}</span>;
      }

      return (
        <div className="app-container">
          <Sidebar activeView={activeView} setView={setActiveView} />
          <div className="main-content">
            <header className="header">
              <div style={{ fontWeight: 700, fontSize: '1.1rem' }}>OHMEALS <span style={{ fontWeight: 400, color: 'var(--text-muted)' }}>Admin</span></div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: '0.9rem', fontWeight: '600' }}>{user.username}</div>
                  <div style={{ fontSize: '0.75rem', color: 'var(--accent)' }}>En ligne</div>
                </div>
                <div style={{ width: '40px', height: '40px', borderRadius: '50%', background: 'linear-gradient(135deg, var(--accent), #a38512)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#000', fontWeight: 'bold' }}>{user.username.charAt(0).toUpperCase()}</div>
              </div>
            </header>
            <div className="content-scroll">{renderView()}</div>
            <ToastContainer />
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
    {% endraw %}
  </script>
</body>

</html>
