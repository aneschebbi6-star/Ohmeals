<!DOCTYPE html>
<html>

<head>
  <!-- Basic -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- Mobile Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <!-- Site Metas -->
  <meta name="keywords" content="" />
  <meta name="description" content="" />
  <meta name="author" content="" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.png') }}" type="image/png" />

  <title>Oh Meals</title>

  <!-- bootstrap core css -->
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/bootstrap.css') }}" />

  <!--owl slider stylesheet -->
  <link rel="stylesheet" type="text/css"
    href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" />

  <!-- nice select  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-nice-select/1.1.0/css/nice-select.min.css"
    integrity="sha512-CruCP+TD3yXzlvvijET8wV5WxxEh5H8P4cmz0RFbKK6FlZ2sYl3AEsKlLPHbniXKSrDdFewhbmBK5skbdsASbQ=="
    crossorigin="anonymous" />

  <!-- font awesome style -->
  <link href="{{ url_for('static', filename='css/font-awesome.min.css') }}" rel="stylesheet" />

  <!-- Custom styles for this template -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
  <!-- responsive style -->
  <link href="{{ url_for('static', filename='css/responsive.css') }}" rel="stylesheet" />
</head>

<body class="sub_page">
  <div class="hero_area">
    <div class="bg-box">
      <img src="{{ url_for('static', filename='images/hero-bg.jpg') }}" alt="" />
    </div>
    <!-- header section starts -->
    <header class="header_section">
      <div class="container">
        <nav class="navbar navbar-expand-lg custom_nav-container">
          <a class="navbar-brand" href="{{ url_for('page.index') }}">
            <span>oh Meals</span>
          </a>

          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class=""> </span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mx-auto">
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('page.index') }}">Home</a>
              </li>
              <li class="nav-item active">
                <a class="nav-link" href="{{ url_for('menu.menu') }}">Menu <span class="sr-only">(current)</span></a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('page.about') }}">About</a>
              </li>
            </ul>

            <div class="user_option">
              <a href="{{ url_for('auth.login') }}" class="user_link">
                <i class="fa fa-user" aria-hidden="true"></i>
              </a>
              <a class="cart_link" href="{{ url_for('menu.book') }}" style="position: relative">
                <i class="fa fa-shopping-cart"></i>
                <span id="cart-count" style="
                      position: absolute;
                      top: -8px;
                      right: -8px;
                      background: #ffbe33;
                      color: #fff;
                      padding: 2px 6px;
                      border-radius: 50%;
                      font-size: 0.7rem;
                      display: none;
                    ">0</span>
              </a>
              <a href="{{ url_for('menu.book') }}" class="order_online">Commander</a>
            </div>
          </div>
        </nav>
      </div>
    </header>
    <!-- end header section -->
  </div>

  <!-- food section -->
  <section class="food_section layout_padding-bottom">
    <div class="container">
      <div class="heading_container heading_center">
        <h2>Notre Menu</h2>
      </div>

      <!-- Filtres de Catégorie -->
      <ul class="filters_menu" id="categoryFilters">
        <li class="active" data-filter="*">Tous</li>
        <li data-filter="snack">Snacks</li>
        <li data-filter="plat">Plats</li>
        <li data-filter="salade">Salades</li>
      </ul>

      <!-- Contrôles de Tri -->
      <div class="sorting-controls">
        <select id="sortPrice" class="sort-select">
          <option value="default">Tri: Prix par défaut</option>
          <option value="asc">Prix: Croissant</option>
          <option value="desc">Prix: Décroissant</option>
        </select>
        <select id="sortTaste" class="sort-select">
          <option value="all">Goût: Tous</option>
          <option value="sucre">Sucré</option>
          <option value="sale">Salé</option>
        </select>
      </div>

      <div class="filters-content">
        <!-- Les produits injectés ici via JS -->
        <script>
          window.productsDB = {{ products | tojson }};
        </script>
        <div class="row grid" id="productsGrid"></div>
      </div>

      <div class="btn-box text-center mt-4">
        <a href="#" class="btn btn-outline-dark rounded-pill px-4">Voir plus</a>
      </div>
    </div>
  </section>

  <!-- Modal Produit -->
  <!-- Modal Produit -->
  <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="fw-bold" id="modalProductName">Nom du produit</h5>
          <button type="button" class="btn-close" onclick="closeModal()">
            <span>&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <p id="modalProductDesc" class="text-muted small">
            Description courte ici...
          </p>

          <hr />

          <h6 class="mb-3">Choisir la variante :</h6>
          <div id="modalVariantsList">
            <!-- Variantes injectées par JS -->
          </div>

          <hr />

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="quantity-control">
              <button class="btn-qty" onclick="updateModalQty(-1)">-</button>
              <span id="modalQty" class="fw-bold mx-2">1</span>
              <button class="btn-qty" onclick="updateModalQty(1)">+</button>
            </div>
            <div class="text-end">
              <small>Total</small>
              <div id="modalTotalPrice" class="total-price-display">
                0.00 DT
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer border-0 justify-content-center" style="margin-top: 20px">
          <button type="button" class="btn btn-primary w-50 py-2 rounded-pill" onclick="addToCart()"
            style="background-color: var(--primary-color); color: #000">
            Ajouter au panier
          </button>
        </div>
      </div>
    </div>
  </div>
  <!-- end food section -->
  <!-- footer section -->
  {% include 'includes/footer.html' %}
  <!-- footer section -->

  <!-- jQery -->
  <script src="js/jquery-3.4.1.min.js"></script>
  <!-- popper js -->
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
    integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
    crossorigin="anonymous"></script>
  <!-- bootstrap js -->
  <script src="js/bootstrap.js"></script>
  <!-- owl slider -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
  <!-- isotope js -->
  <script src="https://unpkg.com/isotope-layout@3.0.4/dist/isotope.pkgd.min.js"></script>
  <!-- nice select -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-nice-select/1.1.0/js/jquery.nice-select.min.js"></script>
  <!-- custom js -->
  <script src="js/custom.js"></script>
  <!-- Google Map -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCh39n5U-4IoWpsVGUHWdqB6puEkhRLdmI&callback=myMap"></script>
  <!-- End Google Map -->
  <!-- À mettre avant la fermeture de la balise </body> -->
  <script src="{{ url_for('static', filename='js/menu.js') }}"></script>
</body>

</html>
