<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mot de passe changé</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />

    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #060606, #4d535e);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-box {
        width: 100%;
        max-width: 420px;
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      .login-box h2 {
        font-weight: 600;
        margin-bottom: 25px;
        color: #333;
      }
      .text-success {
        color: green;
        font-size: 1rem;
        margin: 20px 0;
      }
      .btn-primary {
        background: #5b6069;
        border: none;
        height: 45px;
        border-radius: 8px;
        font-weight: 500;
      }
      .btn-primary:hover {
        background: #000000;
      }
    </style>
  </head>

  <body>
    <div class="login-box">
      <h2>Mot de passe changé !</h2>
      <p class="text-success">Votre mot de passe a été modifié avec succès.</p>
      <a href="{{ url_for('login') }}" class="btn btn-primary w-100">
        Retour à la page de connexion
      </a>
    </div>
  </body>
</html>
