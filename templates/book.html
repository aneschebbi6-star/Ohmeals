<!DOCTYPE html>
<html>

<head>
  <!-- Basic -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- Mobile Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <!-- Site Metas -->
  <meta name="keywords" content="ohmeals, traiteur, marocain, panier" />
  <meta name="description" content="Votre panier - OHMEALS Traiteur Marocain" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.png') }}" type="image/png" />

  <title>Panier - OHMEALS</title>

  <!-- bootstrap core css -->
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/bootstrap.css') }}" />
  <!-- font awesome style -->
  <link href="{{ url_for('static', filename='css/font-awesome.min.css') }}" rel="stylesheet" />
  <!-- Custom styles -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/responsive.css') }}" rel="stylesheet" />

  <style>
    /* Cart Page Specific Styles */
    .cart_section {
      padding: 60px 0;
      min-height: 60vh;
    }

    .cart_section h2 {
      margin-bottom: 30px;
      color: #222;
    }

    #cart-table {
      width: 100%;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
    }

    #cart-table th {
      background: #ffbe33;
      color: #fff;
      padding: 15px;
      text-align: left;
    }

    #cart-table td {
      padding: 15px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }

    .qty-btn {
      width: 30px;
      height: 30px;
      border: 1px solid #ddd;
      background: #f8f8f8;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }

    .qty-btn:hover {
      background: #ffbe33;
      color: #fff;
      border-color: #ffbe33;
    }

    .qty-value {
      display: inline-block;
      width: 40px;
      text-align: center;
      font-weight: bold;
    }

    .remove-btn {
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .remove-btn:hover {
      background: #c0392b;
    }

    .line-total {
      font-weight: bold;
      color: #ffbe33;
    }

    .cart-footer {
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .cart-total {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .cart-total span {
      color: #ffbe33;
    }

    #checkout-btn {
      background: #ffbe33;
      color: #fff;
      border: none;
      padding: 15px 40px;
      font-size: 1.1rem;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    #checkout-btn:hover {
      background: #e6a82e;
      transform: translateY(-2px);
    }

    #cart-empty {
      text-align: center;
      padding: 60px 20px;
      background: #fff;
      border-radius: 10px;
    }

    #cart-empty i {
      font-size: 4rem;
      color: #ddd;
      margin-bottom: 20px;
    }

    #cart-empty a {
      display: inline-block;
      margin-top: 20px;
      background: #ffbe33;
      color: #fff;
      padding: 12px 30px;
      border-radius: 30px;
      text-decoration: none;
    }

    /* Checkout Modal */
    #checkout-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      position: relative;
    }

    .modal-content h3 {
      margin-bottom: 25px;
      color: #222;
    }

    .modal-content .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 1.5rem;
      cursor: pointer;
      color: #999;
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      background: #fff;
      color: #333;
      appearance: auto;
    }

    .modal-content input:focus,
    .modal-content select:focus {
      outline: none;
      border-color: #ffbe33;
    }

    .modal-content button[type="submit"] {
      width: 100%;
      background: #ffbe33;
      color: #fff;
      border: none;
      padding: 15px;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .modal-content button[type="submit"]:hover {
      background: #e6a82e;
    }

    .order-confirmation {
      text-align: center;
      padding: 60px 20px;
    }

    .order-confirmation h2 {
      margin: 20px 0;
    }

    .order-confirmation .main-btn {
      display: inline-block;
      margin-top: 30px;
      background: #ffbe33;
      color: #fff;
      padding: 12px 30px;
      border-radius: 30px;
      text-decoration: none;
    }
  </style>
</head>

<body class="sub_page">
  <div class="hero_area">
    <div class="bg-box">
      <img src="{{ url_for('static', filename='images/hero-bg.jpg') }}" alt="" />
    </div>
    <!-- header section starts -->
    <header class="header_section">
      <div class="container">
        <nav class="navbar navbar-expand-lg custom_nav-container">
          <a class="navbar-brand" href="{{ url_for('page.index') }}">
            <span>oh Meals</span>
          </a>

          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class=""></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mx-auto">
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('page.index') }}">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('menu.menu') }}">Menu</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('page.about') }}">About</a>
              </li>
            </ul>
            <div class="user_option">
              <a href="{{ url_for('auth.login') }}" class="user_link">
                <i class="fa fa-user" aria-hidden="true"></i>
              </a>
              <a class="cart_link" href="{{ url_for('menu.book') }}" style="position:relative;">
                <i class="fa fa-shopping-cart"></i>
                <span id="cart-count"
                  style="position:absolute;top:-8px;right:-8px;background:#ffbe33;color:#fff;padding:2px 6px;border-radius:50%;font-size:0.7rem;display:none;">0</span>
              </a>
            </div>
          </div>
        </nav>
      </div>
    </header>
    <!-- end header section -->
  </div>

  <!-- Cart Section -->
  <section class="cart_section layout_padding">
    <div class="container">
      <div class="heading_container">
        <h2>Votre Panier</h2>
      </div>

      <!-- Empty Cart Message -->
      <div id="cart-empty" style="display: none;">
        <i class="fa fa-shopping-cart"></i>
        <h3>Votre panier est vide</h3>
        <p>Parcourez notre menu et ajoutez des délices !</p>
        <a href="{{ url_for('menu.menu') }}">Voir le Menu</a>
      </div>

      <!-- Cart Table -->
      <table id="cart-table" style="display: none;">
        <thead>
          <tr>
            <th>Produit</th>
            <th>Prix</th>
            <th>Quantité</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="cart-items">
          <!-- Rendered by cart.js -->
        </tbody>
      </table>

      <!-- Cart Footer -->
      <div class="cart-footer">
        <div class="cart-total">
          Total: <span id="cart-total-value">0.00</span> DT
        </div>
        <button id="checkout-btn" onclick="openCheckoutModal()" style="display: none;">
          <i class="fa fa-check"></i> Commander
        </button>
      </div>
    </div>
  </section>
  <!-- End Cart Section -->

  <!-- Checkout Modal -->
  <div id="checkout-modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeCheckoutModal()">&times;</span>
      <h3><i class="fa fa-truck"></i> Finaliser la Commande</h3>
      <form id="checkout-form" onsubmit="submitOrder(event)">
        <input type="text" name="name" placeholder="Nom complet *" required />
        <input type="tel" name="phone" placeholder="Téléphone *" required />

        <!-- City Select -->
        <select name="city" id="city-select" required onchange="checkDeliveryZone()">
          <option value="">-- Sélectionnez votre ville --</option>
          <optgroup label="Zone de livraison disponible">
            <option value="Tunis">Tunis</option>
            <option value="Ariana">Ariana</option>
            <option value="Ben Arous">Ben Arous</option>
          </optgroup>
          <optgroup label="Autres villes (livraison non disponible)">
            <option value="Manouba">Manouba</option>
            <option value="Sousse">Sousse</option>
            <option value="Sfax">Sfax</option>
            <option value="Bizerte">Bizerte</option>
            <option value="Nabeul">Nabeul</option>
            <option value="Kairouan">Kairouan</option>
            <option value="Gabès">Gabès</option>
            <option value="Monastir">Monastir</option>
            <option value="Mahdia">Mahdia</option>
            <option value="Kasserine">Kasserine</option>
            <option value="Gafsa">Gafsa</option>
            <option value="Médenine">Médenine</option>
            <option value="Jendouba">Jendouba</option>
            <option value="Béja">Béja</option>
            <option value="Sidi Bouzid">Sidi Bouzid</option>
            <option value="Kef">Kef</option>
            <option value="Siliana">Siliana</option>
            <option value="Tataouine">Tataouine</option>
            <option value="Tozeur">Tozeur</option>
            <option value="Kébili">Kébili</option>
            <option value="Zaghouan">Zaghouan</option>
          </optgroup>
        </select>

        <!-- Delivery zone message -->
        <div id="delivery-message" style="display:none; padding: 10px; margin-bottom: 15px; border-radius: 8px;"></div>

        <input type="text" name="address" placeholder="Adresse de livraison *" required />
        <input type="email" name="email" placeholder="Email (optionnel)" />
        <button type="submit" id="checkout-submit-btn">
          <i class="fa fa-paper-plane"></i> Confirmer la Commande
        </button>
      </form>
    </div>
  </div>
  <!-- End Checkout Modal -->

  <!-- footer section -->
  {% include 'includes/footer.html' %}
  <!-- end footer section -->

  <!-- Scripts -->
  <script src="{{ url_for('static', filename='js/jquery-3.4.1.min.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="{{ url_for('static', filename='js/bootstrap.js') }}"></script>
  <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
</body>

</html>
