<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mot de passe oublié</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #060606, #4d535e);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-box {
        width: 100%;
        max-width: 420px;
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      .login-box h2 {
        font-weight: 600;
        margin-bottom: 25px;
        color: #333;
      }
      .form-label {
        color: #444;
      }
      .form-control {
        height: 45px;
        border-radius: 8px;
      }
      .btn-primary {
        background: #5b6069;
        border: none;
        height: 45px;
        border-radius: 8px;
        font-weight: 500;
      }
      .btn-primary:hover {
        background: #000000;
      }
      .text-error {
        color: red;
        font-size: 0.9rem;
        margin-top: 5px;
      }
      .text-success {
        color: green;
        font-size: 0.9rem;
        margin-top: 5px;
      }
      .link {
        cursor: pointer;
        color: blue;
        text-decoration: underline;
      }
      .eye-toggle {
        position: absolute;
        right: 15px;
        top: 12px;
        cursor: pointer;
        font-size: 1.2rem;
        color: #555;
      }
      .password-wrapper {
        position: relative;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>Mot de passe oublié</h2>

      <label class="form-label">Email :</label>
      <input
        type="email"
        id="email"
        class="form-control mb-3"
        placeholder="votre.email@domaine.com"
        required
        autocomplete="off"
      />

      <div id="codeDiv" style="display: none">
        <label class="form-label">Entrez le code reçu :</label>
        <input
          type="text"
          id="codeInput"
          class="form-control mb-3"
          maxlength="6"
          required
        />
        <p class="link" id="resendCode" style="display: none">
          Renvoyer le code
        </p>

        <div id="newPasswordDiv" style="display: none">
          <label class="form-label">Nouveau mot de passe :</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="newPassword"
              class="form-control mb-3"
              required
            />
            <span class="eye-toggle" id="togglePassword">
              <i class="bi bi-eye"></i>
            </span>
          </div>
          <button id="changePasswordBtn" class="btn btn-primary w-100">
            Changer le mot de passe
          </button>
        </div>
      </div>

      <p id="message"></p>
      <button id="sendCodeBtn" class="btn btn-primary w-100">
        Envoyer le code
      </button>
    </div>

    <script>
      const sendBtn = document.getElementById("sendCodeBtn");
      const codeDiv = document.getElementById("codeDiv");
      const newPasswordDiv = document.getElementById("newPasswordDiv");
      const emailInput = document.getElementById("email");
      const codeInput = document.getElementById("codeInput");
      const newPasswordInput = document.getElementById("newPassword");
      const message = document.getElementById("message");
      const resendLink = document.getElementById("resendCode");
      const changePasswordBtn = document.getElementById("changePasswordBtn");
      const togglePassword = document.getElementById("togglePassword");

      let lastCodeSent = 0; // timestamp du dernier envoi de code

      function showMessage(text, type = "error") {
        message.textContent = text;
        message.className = type === "error" ? "text-error" : "text-success";
      }

      // Étape 1 : envoyer le code
      sendBtn.addEventListener("click", () => {
        const email = emailInput.value.trim();
        if (!email) return showMessage("Veuillez entrer votre email");

        const now = Date.now();
        if (now - lastCodeSent < 60000) {
          showMessage("Veuillez attendre 1 minute avant de renvoyer le code");
          return;
        }

        fetch("/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ email: email }),
        })
          .then((res) => res.text())
          .then((res) => {
            if (res === "EMAIL_NOT_FOUND") showMessage("Email non trouvé");
            else if (res === "CODE_SENT") {
              showMessage("Code envoyé par email", "success");
              codeDiv.style.display = "block";
              sendBtn.style.display = "none";
              lastCodeSent = now;
            }
          });
      });

      // Étape 2 : vérifier le code
      codeInput.addEventListener("blur", () => {
        const email = emailInput.value.trim();
        const code = codeInput.value.trim();
        if (!code) return;

        fetch("/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ email: email, code: code }),
        })
          .then((res) => res.text())
          .then((res) => {
            if (res === "CODE_INCORRECT") {
              showMessage("Code incorrect");
              resendLink.style.display = "block"; // affiché uniquement si code incorrect
            } else if (res === "CODE_CORRECT") {
              showMessage("Code correct", "success");
              newPasswordDiv.style.display = "block";
              resendLink.style.display = "none";
            }
          });
      });

      // Étape 3 : changer le mot de passe
      changePasswordBtn.addEventListener("click", () => {
        const email = emailInput.value.trim();
        const code = codeInput.value.trim();
        const newPassword = newPasswordInput.value.trim();

        // Validation mot de passe : lettres + chiffres + ≥ 5 caractères
        if (
          newPassword.length < 5 ||
          !/[a-zA-Z]/.test(newPassword) ||
          !/\d/.test(newPassword)
        ) {
          return showMessage(
            "Le mot de passe doit contenir au moins 5 caractères, lettres et chiffres"
          );
        }

        fetch("/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            email: email,
            code: code,
            new_password: newPassword,
          }),
        })
          .then((res) => res.text())
          .then((res) => {
            if (res === "CODE_INCORRECT") showMessage("Code incorrect");
            else if (res === "PASSWORD_CHANGED") {
              showMessage("Mot de passe changé avec succès !", "success");
              setTimeout(() => {
                window.location.href = "/login";
              }, 1500);
            }
          });
      });

      // Renvoyer le code
      resendLink.addEventListener("click", () => {
        sendBtn.click();
      });
      // -------------------
      // Afficher / masquer le mot de passe
      // -------------------
      togglePassword.addEventListener("click", () => {
        const icon = togglePassword.querySelector("i");
        if (newPasswordInput.type === "password") {
          newPasswordInput.type = "text";
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
        } else {
          newPasswordInput.type = "password";
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
        }
      });
    </script>
  </body>
</html>
